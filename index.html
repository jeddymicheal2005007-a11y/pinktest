<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <title>Pink App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-primary: #fe2c55;
            --pink-secondary: #ff6b8a;
            --pink-glow: rgba(254, 44, 85, 0.4);
            --bg-dark: #0a0a0f;
            --bg-darker: #050508;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --gold: #ffd700;
            --cyan: #25f4ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-primary); overflow: hidden; height: 100vh; width: 100vw; position: relative; }

        /* Ambient Background */
        .ambient-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; }
        .orb-1 { width: 300px; height: 300px; background: var(--pink-primary); top: -100px; right: -100px; }
        .orb-2 { width: 250px; height: 250px; background: var(--cyan); bottom: 10%; left: -80px; opacity: 0.2; }
        .orb-3 { width: 200px; height: 200px; background: var(--gold); top: 40%; left: 50%; opacity: 0.1; }
        .grain { position: fixed; inset: 0; z-index: 1; opacity: 0.03; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); pointer-events: none; }

        /* Main Content */
        .splash-container { position: relative; z-index: 2; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }

        /* P Logo from original splash */
        .logo-wrapper { position: relative; width: 140px; height: 140px; margin-bottom: 2.5rem; }
        .logo-glow { position: absolute; inset: -20px; background: radial-gradient(circle, var(--pink-glow) 0%, transparent 70%); border-radius: 50%; animation: pulse-glow 3s infinite ease-in-out; }
        @keyframes pulse-glow { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }

        .logo-svg { width: 100%; height: 100%; position: relative; z-index: 2; }
        .logo-path { fill: none; stroke: url(#logoGradient); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 400; stroke-dashoffset: 400; animation: draw-logo 2s ease-out forwards, shimmer 3s infinite 2s; }
        @keyframes draw-logo { to { stroke-dashoffset: 0; } }
        @keyframes shimmer { 0%, 100% { filter: drop-shadow(0 0 10px var(--pink-glow)); } 50% { filter: drop-shadow(0 0 25px var(--pink-glow)); } }
        .logo-fill { fill: url(#logoGradient); opacity: 0; animation: fade-in-fill 1s ease-out 1.5s forwards; }
        @keyframes fade-in-fill { to { opacity: 1; } }

        /* Brand Text */
        .brand-text { text-align: center; margin-bottom: 3rem; }
        .brand-name { font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg, #fff 0%, var(--pink-secondary) 50%, var(--pink-primary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 0; transform: translateY(20px); animation: slide-up 0.8s ease-out 0.5s forwards; }
        .brand-tagline { font-size: 0.95rem; font-weight: 400; color: var(--text-secondary); letter-spacing: 3px; text-transform: uppercase; margin-top: 0.5rem; opacity: 0; transform: translateY(15px); animation: slide-up 0.8s ease-out 0.8s forwards; }
        @keyframes slide-up { to { opacity: 1; transform: translateY(0); } }

        /* Dashboard Spinner */
        .spinner-container { display: flex; flex-direction: column; align-items: center; gap: 1rem; opacity: 0; animation: fade-in 0.5s ease-out 1.5s forwards; }
        @keyframes fade-in { to { opacity: 1; } }

        .spinner-ring { width: 56px; height: 56px; position: relative; }
        .spinner-ring::before { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--pink-primary); border-right-color: var(--pink-secondary); animation: spin 1s linear infinite; }
        .spinner-ring::after { content: ''; position: absolute; inset: 8px; border-radius: 50%; border: 3px solid transparent; border-bottom-color: var(--cyan); border-left-color: var(--gold); animation: spin 1.5s linear infinite reverse; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text { font-size: 0.8rem; color: var(--text-secondary); letter-spacing: 2px; text-transform: uppercase; }
        .loading-dots::after { content: ''; animation: dots 1.5s infinite; }
        @keyframes dots { 0%, 20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%, 100% { content: '...'; } }

        /* Version */
        .version-text { position: absolute; top: 2rem; right: 2rem; font-size: 0.7rem; color: var(--text-secondary); letter-spacing: 2px; opacity: 0; animation: fade-in 1s ease-out 1.2s forwards; }

        /* Footer */
        .footer-text { position: absolute; bottom: 2rem; left: 0; right: 0; text-align: center; font-size: 0.65rem; color: rgba(255, 255, 255, 0.2); letter-spacing: 1px; opacity: 0; animation: fade-in 1s ease-out 2s forwards; }

        /* Transition Overlay */
        .transition-overlay { position: fixed; inset: 0; background: var(--bg-dark); z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.5s ease; }
        .transition-overlay.active { opacity: 1; pointer-events: all; }

        @media (max-height: 700px) {
            .logo-wrapper { width: 110px; height: 110px; margin-bottom: 1.5rem; }
            .brand-name { font-size: 2.2rem; }
        }
    </style>
</head>
<body>
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>
    <div class="grain"></div>

    <div class="version-text">v3.0.0</div>

    <div class="splash-container">
        <div class="logo-wrapper">
            <div class="logo-glow"></div>
            <svg class="logo-svg" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#fe2c55"/>
                        <stop offset="50%" style="stop-color:#ff6b8a"/>
                        <stop offset="100%" style="stop-color:#25f4ee"/>
                    </linearGradient>
                </defs>
                <path class="logo-path" d="M30 85 L30 25 Q30 15 45 15 L55 15 Q70 15 70 30 Q70 45 55 45 L30 45"/>
                <circle class="logo-fill" cx="55" cy="30" r="6"/>
                <circle class="logo-path" cx="50" cy="50" r="38" fill="none" stroke-width="1.5" opacity="0.3"/>
            </svg>
        </div>

        <div class="brand-text">
            <h1 class="brand-name">Pink App</h1>
            <p class="brand-tagline">Scroll. Earn. Repeat.</p>
        </div>

        <div class="spinner-container">
            <div class="spinner-ring"></div>
            <div class="loading-text">Loading<span class="loading-dots"></span></div>
        </div>
    </div>

    <div class="footer-text">Designed for Africa</div>

    <div class="transition-overlay" id="transitionOverlay"></div>

    <script>
        history.pushState(null, null, location.href);
        window.onpopstate = function() { history.pushState(null, null, location.href); };

        setTimeout(() => {
            document.getElementById('transitionOverlay').classList.add('active');
            setTimeout(() => { window.location.href = 'pink-login.html'; }, 500);
        }, 3500);
    </script>
</body>
</html>

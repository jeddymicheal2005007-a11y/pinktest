<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <title>Login - Pink App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --pink-primary: #fe2c55;
            --pink-secondary: #ff6b8a;
            --pink-glow: rgba(254, 44, 85, 0.4);
            --bg-dark: #0a0a0f;
            --bg-darker: #050508;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.06);
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --text-muted: rgba(255, 255, 255, 0.3);
            --gold: #ffd700;
            --cyan: #25f4ee;
            --success: #00d26a;
            --error: #ff4757;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; position: relative; }
        .ambient-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; }
        .orb-1 { width: 250px; height: 250px; background: var(--pink-primary); top: -80px; right: -80px; }
        .orb-2 { width: 200px; height: 200px; background: var(--cyan); bottom: 10%; left: -60px; opacity: 0.2; }
        .grain { position: fixed; inset: 0; z-index: 1; opacity: 0.03; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }
        .page-container { position: relative; z-index: 2; min-height: 100vh; display: flex; flex-direction: column; padding: 0 1.5rem; max-width: 480px; margin: 0 auto; }
        .header { padding-top: 3rem; margin-bottom: 2.5rem; animation: slide-down 0.6s ease-out; }
        @keyframes slide-down { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .logo-small { width: 48px; height: 48px; margin-bottom: 1.5rem; }
        .logo-small svg { width: 100%; height: 100%; }
        .welcome-title { font-size: 2rem; font-weight: 700; line-height: 1.2; margin-bottom: 0.5rem; background: linear-gradient(135deg, #fff 0%, var(--pink-secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .welcome-subtitle { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.5; }
        .glass-card { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 24px; padding: 2rem 1.5rem; margin-bottom: 1.5rem; animation: slide-up 0.7s ease-out 0.1s both; }
        @keyframes slide-up { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .input-group { margin-bottom: 1.25rem; position: relative; }
        .input-group:last-of-type { margin-bottom: 0.5rem; }
        .input-label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.5rem; letter-spacing: 0.5px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-icon { position: absolute; left: 1rem; color: var(--text-muted); z-index: 2; transition: color 0.3s; }
        .input-field { width: 100%; padding: 1rem 1rem 1rem 2.8rem; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); border-radius: 16px; color: var(--text-primary); font-size: 0.95rem; font-weight: 400; outline: none; transition: all 0.3s ease; }
        .input-field::placeholder { color: var(--text-muted); }
        .input-field:focus { border-color: var(--pink-primary); background: rgba(254, 44, 85, 0.05); box-shadow: 0 0 0 3px rgba(254, 44, 85, 0.1); }
        .input-field:focus + .input-icon, .input-wrapper:focus-within .input-icon { color: var(--pink-primary); }
        .input-field.is-password { padding-right: 3rem; }
        .toggle-password { position: absolute; right: 1rem; background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.25rem; z-index: 2; }
        .options-row { display: flex; justify-content: space-between; align-items: center; margin: 1.25rem 0; }
        .remember-me { display: flex; align-items: center; gap: 0.5rem; cursor: pointer; }
        .remember-me input { display: none; }
        .check-box { width: 20px; height: 20px; border: 2px solid var(--glass-border); border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: all 0.3s; flex-shrink: 0; }
        .remember-me input:checked + .check-box { background: var(--pink-primary); border-color: var(--pink-primary); }
        .check-box svg { width: 12px; height: 12px; opacity: 0; transition: opacity 0.3s; }
        .remember-me input:checked + .check-box svg { opacity: 1; }
        .remember-text { font-size: 0.85rem; color: var(--text-secondary); }
        .forgot-link { font-size: 0.85rem; color: var(--pink-secondary); text-decoration: none; font-weight: 500; transition: color 0.3s; cursor: pointer; background: none; border: none; }
        .forgot-link:hover { color: var(--pink-primary); }
        .btn-primary { width: 100%; padding: 1rem; background: linear-gradient(135deg, var(--pink-primary), var(--pink-secondary)); border: none; border-radius: 16px; color: white; font-size: 1rem; font-weight: 600; cursor: pointer; position: relative; overflow: hidden; transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(254, 44, 85, 0.3); }
        .btn-primary:active { transform: scale(0.98); box-shadow: 0 2px 10px rgba(254, 44, 85, 0.2); }
        .btn-primary::after { content: ''; position: absolute; inset: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transform: translateX(-100%); transition: transform 0.5s; }
        .btn-primary:hover::after { transform: translateX(100%); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline { width: 100%; padding: 0.875rem; background: transparent; border: 1px solid var(--glass-border); border-radius: 14px; color: var(--text-primary); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-top: 0.5rem; }
        .btn-outline:hover { background: rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.15); }
        .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--text-muted); font-size: 0.8rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--glass-border); }
        .social-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
        .btn-social { display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.875rem; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 14px; color: var(--text-primary); font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.3s; }
        .btn-social:hover { background: var(--glass-hover); border-color: rgba(255, 255, 255, 0.15); }
        .btn-social svg { width: 20px; height: 20px; }
        .signup-prompt { text-align: center; padding-bottom: 2rem; animation: slide-up 0.7s ease-out 0.3s both; }
        .signup-prompt p { color: var(--text-secondary); font-size: 0.9rem; }
        .signup-prompt a { color: var(--pink-secondary); text-decoration: none; font-weight: 600; transition: color 0.3s; }
        .spinner-overlay { position: fixed; inset: 0; background: rgba(10, 10, 15, 0.95); backdrop-filter: blur(10px); z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem; }
        .spinner-overlay.active { display: flex; }
        .spinner-ring { width: 56px; height: 56px; position: relative; }
        .spinner-ring::before { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--pink-primary); border-right-color: var(--pink-secondary); animation: spin 1s linear infinite; }
        .spinner-ring::after { content: ''; position: absolute; inset: 8px; border-radius: 50%; border: 3px solid transparent; border-bottom-color: var(--cyan); border-left-color: var(--gold); animation: spin 1.5s linear infinite reverse; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner-text { color: var(--text-secondary); font-size: 0.9rem; letter-spacing: 1px; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        .shake { animation: shake 0.4s ease-in-out; }
        .toast { position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%) translateY(-100px); background: rgba(255, 71, 87, 0.9); backdrop-filter: blur(10px); color: white; padding: 0.875rem 1.5rem; border-radius: 12px; font-size: 0.9rem; font-weight: 500; z-index: 1001; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); white-space: nowrap; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: rgba(0, 210, 106, 0.9); }
        .reset-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: flex-end; justify-content: center; }
        .reset-modal-overlay.active { display: flex; }
        .reset-modal { width: 100%; max-width: 480px; background: linear-gradient(180deg, #1a1a24, var(--bg-dark)); border-radius: 24px 24px 0 0; border: 1px solid var(--glass-border); border-bottom: none; padding: 1.5rem; animation: slide-up-modal 0.3s ease; }
        @keyframes slide-up-modal { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .reset-modal h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .reset-modal p { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 1rem; }
        .reset-modal .btn { margin-top: 0.75rem; }
    </style>
</head>
<body>
    <div class="ambient-bg">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>
    <div class="grain"></div>

    <div class="page-container">
        <header class="header">
            <div class="logo-small">
                <svg viewBox="0 0 48 48" fill="none">
                    <defs><linearGradient id="smallGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#fe2c55"/><stop offset="100%" style="stop-color:#ff6b8a"/></linearGradient></defs>
                    <path d="M14 40 L14 12 Q14 7 21 7 L26 7 Q33 7 33 14 Q33 21 26 21 L14 21" stroke="url(#smallGrad)" stroke-width="3" stroke-linecap="round" fill="none"/>
                    <circle cx="26" cy="14" r="3" fill="url(#smallGrad)"/>
                </svg>
            </div>
            <h1 class="welcome-title">Welcome<br>Back</h1>
            <p class="welcome-subtitle">Sign in to continue earning with Pink App</p>
        </header>

        <div class="glass-card">
            <form id="loginForm" autocomplete="off" onsubmit="event.preventDefault(); handleLogin();">
                <div class="input-group">
                    <label class="input-label">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
                            </svg>
                        </span>
                        <input type="email" class="input-field" id="loginEmail" placeholder="your@email.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label class="input-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                            </svg>
                        </span>
                        <input type="password" class="input-field is-password" id="loginPassword" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="options-row">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe">
                        <span class="check-box">
                            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                        </span>
                        <span class="remember-text">Remember me</span>
                    </label>
                    <button type="button" class="forgot-link" onclick="openResetModal()">Forgot Password?</button>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
            </form>

            <div class="divider">or continue with</div>

            <div class="social-grid">
                <button class="btn-social" id="googleLoginBtn" onclick="googleOneTap()">
                    <svg viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>
            </div>
        </div>

        <div class="signup-prompt">
            <p>Don't have an account? <a href="pink-signup.html" onclick="return navigateWithSpinner(event, 'pink-signup.html')">Sign Up</a></p>
        </div>
    </div>

    <div class="reset-modal-overlay" id="resetModal" onclick="closeResetModal(event)">
        <div class="reset-modal" onclick="event.stopPropagation()">
            <h3>Reset Password</h3>
            <p>Enter your email and we'll send you a reset link.</p>
            <div class="input-wrapper" style="margin-bottom:0.75rem;">
                <span class="input-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </span>
                <input type="email" class="input-field" id="resetEmail" placeholder="your@email.com" style="padding-left:2.5rem;">
            </div>
            <button class="btn-primary" onclick="sendPasswordReset()">Send Reset Link</button>
            <button class="btn-outline" onclick="closeResetModal()">Cancel</button>
        </div>
    </div>

    <div class="spinner-overlay" id="spinnerOverlay">
        <div class="spinner-ring"></div>
        <div class="spinner-text" id="spinnerText">Please wait...</div>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, signInWithCredential, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUEKYA5x1T2Qb3T8Z6rP5qv5jmfTXlRU0",
            authDomain: "pink-app-5ecd1.firebaseapp.com",
            projectId: "pink-app-5ecd1",
            storageBucket: "pink-app-5ecd1.firebasestorage.app",
            messagingSenderId: "659145722582",
            appId: "1:659145722582:web:1e0778ce8aa62dff129777",
            measurementId: "G-G299LL6DM6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.pinkFirebase = { auth, db, app };

        // ── Email/Password Login ──────────────────────────────────
        window.firebaseLogin = async function(email, password) {
            try {
                const result = await signInWithEmailAndPassword(auth, email, password);
                const user = result.user;

                if (!user.emailVerified) {
                    return { success: false, error: "Please verify your email first. Check your inbox.", needsVerification: true, user: user };
                }

                const userDoc = await getDoc(doc(db, "users", user.uid));
                const data = userDoc.exists() ? userDoc.data() : null;

                return { success: true, user: user, firestoreData: data };

            } catch (error) {
                let msg = error.message;
                if (error.code === "auth/user-not-found") msg = "No account found with this email.";
                else if (error.code === "auth/wrong-password") msg = "Incorrect password.";
                else if (error.code === "auth/invalid-email") msg = "Invalid email address.";
                else if (error.code === "auth/too-many-requests") msg = "Too many attempts. Try again later.";
                else if (error.code === "auth/user-disabled") msg = "This account has been disabled.";
                else if (error.code === "auth/invalid-credential") msg = "Invalid email or password.";
                return { success: false, error: msg, code: error.code };
            }
        };

        // ── Password Reset ────────────────────────────────────────
        window.firebaseResetPassword = async function(email) {
            try {
                await sendPasswordResetEmail(auth, email, {
                    url: "https://pinktest-delta.vercel.app/pink-login.html"
                });
                return { success: true };
            } catch (error) {
                let msg = error.message;
                if (error.code === "auth/user-not-found") msg = "No account found with this email.";
                else if (error.code === "auth/invalid-email") msg = "Invalid email address.";
                return { success: false, error: msg };
            }
        };

        // ── Google Sign-In ────────────────────────────────────────
        window.firebaseGoogleLogin = async function(googleCredential, name, email, googleId) {
            try {
                const credential = GoogleAuthProvider.credential(googleCredential);
                const result = await signInWithCredential(auth, credential);
                const user = result.user;

                const userRef = doc(db, "users", user.uid);
                const userSnap = await getDoc(userRef);
                const now = serverTimestamp();

                if (!userSnap.exists()) {
                    const deviceId = 'GOOGLE-' + googleId.slice(-8);
                    const myCode = 'PINK-' + deviceId.slice(-4).toUpperCase();
                    
                    const userDocData = {
                        name: name,
                        nickname: name.split(' ')[0],
                        email: email,
                        phone: user.phoneNumber || deviceId,
                        country: "Nigeria",
                        coins: 0,
                        balance: 0,
                        escrowBalance: 0,
                        totalReferrals: 0,
                        referralEarnings: 0,
                        referralCode: myCode,
                        emailVerified: true,
                        firebaseUid: user.uid,
                        authMethod: "google",
                        security: {},
                        createdAt: now,
                        lastLoginAt: now
                    };
                    await setDoc(userRef, userDocData);
                    return { success: true, user: user, phone: deviceId, myCode: myCode, isNew: true };
                } else {
                    await setDoc(userRef, { lastLoginAt: now }, { merge: true });
                    const data = userSnap.data();
                    return { success: true, user: user, phone: data.phone || user.phoneNumber, myCode: data.referralCode, isNew: false, firestoreData: data };
                }

            } catch (error) {
                return { success: false, error: error.message, code: error.code };
            }
        };
    </script>

    <script>
        const GOOGLE_CLIENT_ID = "659145722582-lr2tdsqotfftsa8dck29h92uvqonn4nl.apps.googleusercontent.com";

        window.onload = function() {
            if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleGoogleLoginResponse,
                    auto_select: false,
                    cancel_on_tap_outside: true
                });
            }
        };

        function googleOneTap() {
            if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
                google.accounts.id.prompt((notification) => {
                    if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
                        showToast('Google Sign-In popup blocked. Please allow popups.', false);
                    }
                });
            } else {
                showToast('Google Sign-In not available', false);
            }
        }

        async function handleGoogleLoginResponse(response) {
            try {
                const base64Url = response.credential.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));

                const googleUser = JSON.parse(jsonPayload);
                const overlay = document.getElementById('spinnerOverlay');
                document.getElementById('spinnerText').textContent = 'Signing in with Google...';
                overlay.classList.add('active');

                const result = await window.firebaseGoogleLogin(
                    response.credential,
                    googleUser.name,
                    googleUser.email,
                    googleUser.sub
                );

                overlay.classList.remove('active');

                if (!result.success) {
                    showToast(result.error, false);
                    return;
                }

                const nickname = result.isNew ? googleUser.name.split(' ')[0] : (result.firestoreData?.nickname || googleUser.name.split(' ')[0]);
                const userData = {
                    fullName: googleUser.name,
                    nickname: nickname,
                    email: googleUser.email,
                    picture: googleUser.picture || '',
                    googleId: googleUser.sub,
                    authMethod: 'google',
                    phone: result.phone,
                    firebaseUid: result.user.uid,
                    emailVerified: true,
                    country: result.firestoreData?.country || 'Nigeria'
                };

                localStorage.setItem('pinkApp_userData', JSON.stringify(userData));
                localStorage.setItem('pinkApp_loggedIn', 'true');
                localStorage.setItem('pinkApp_authMethod', 'google');
                localStorage.setItem('pinkApp_phone', result.phone);
                localStorage.setItem('pinkApp_nickname', nickname);
                localStorage.setItem('pinkApp_fullName', googleUser.name);
                localStorage.setItem('pinkApp_uid', result.user.uid);
                if (result.myCode) {
                    localStorage.setItem('pinkApp_myReferralCode', result.myCode);
                }

                showToast('Welcome back!', true);
                setTimeout(() => { window.location.href = "pink-dashboard.html"; }, 1200);

            } catch (error) {
                showToast("Google sign-in failed: " + error.message, false);
                console.error(error);
            }
        }

        // ── Email/Password Login ──────────────────────────────────
        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                showToast('Please enter email and password', false);
                return;
            }

            btn.disabled = true;
            const overlay = document.getElementById('spinnerOverlay');
            document.getElementById('spinnerText').textContent = 'Signing you in...';
            overlay.classList.add('active');

            const result = await window.firebaseLogin(email, password);

            overlay.classList.remove('active');
            btn.disabled = false;

            if (!result.success) {
                if (result.needsVerification) {
                    showToast(result.error, false);
                    localStorage.setItem('pinkApp_pendingVerifyEmail', email);
                    localStorage.setItem('pinkApp_pendingVerifyPassword', password);
                    setTimeout(() => {
                        if (confirm('Resend verification email?')) {
                            window.location.href = 'pink-signup.html';
                        }
                    }, 500);
                } else {
                    showToast(result.error, false);
                    document.getElementById('loginEmail').parentElement.classList.add('shake');
                    setTimeout(() => document.getElementById('loginEmail').parentElement.classList.remove('shake'), 400);
                }
                return;
            }

            const user = result.user;
            const firestoreData = result.firestoreData;

            const userData = {
                fullName: firestoreData?.name || firestoreData?.nickname || user.displayName || email.split('@')[0],
                nickname: firestoreData?.nickname || user.displayName || email.split('@')[0],
                email: email,
                phone: firestoreData?.phone || user.uid.slice(-8),
                firebaseUid: user.uid,
                authMethod: 'email',
                emailVerified: true,
                country: firestoreData?.country || 'Nigeria'
            };

            localStorage.setItem('pinkApp_userData', JSON.stringify(userData));
            localStorage.setItem('pinkApp_loggedIn', 'true');
            localStorage.setItem('pinkApp_authMethod', 'email');
            localStorage.setItem('pinkApp_phone', userData.phone);
            localStorage.setItem('pinkApp_nickname', userData.nickname);
            localStorage.setItem('pinkApp_fullName', userData.fullName);
            localStorage.setItem('pinkApp_uid', user.uid);

            if (firestoreData?.nickname) localStorage.setItem('pinkApp_nickname', firestoreData.nickname);
            if (firestoreData?.name) localStorage.setItem('pinkApp_fullName', firestoreData.name);
            if (firestoreData?.referralCode) {
                localStorage.setItem('pinkApp_myReferralCode', firestoreData.referralCode);
            }

            if (rememberMe) {
                localStorage.setItem('pinkApp_rememberEmail', email);
            }

            showToast('Welcome back!', true);
            setTimeout(() => { window.location.href = "pink-dashboard.html"; }, 1200);
        }

        // ── Password Reset ────────────────────────────────────────
        function openResetModal() {
            document.getElementById('resetModal').classList.add('active');
            document.getElementById('resetEmail').value = document.getElementById('loginEmail').value;
            document.getElementById('resetEmail').focus();
        }

        function closeResetModal(e) {
            if (!e || e.target.id === 'resetModal') {
                document.getElementById('resetModal').classList.remove('active');
            }
        }

        async function sendPasswordReset() {
            const email = document.getElementById('resetEmail').value.trim();
            if (!email || !email.includes('@')) {
                showToast('Please enter a valid email', false);
                return;
            }

            const btn = document.querySelector('.reset-modal .btn-primary');
            btn.disabled = true;
            btn.textContent = 'Sending...';

            const result = await window.firebaseResetPassword(email);

            btn.disabled = false;
            btn.textContent = 'Send Reset Link';

            if (result.success) {
                showToast('Reset link sent! Check your email.', true);
                closeResetModal();
            } else {
                showToast(result.error, false);
            }
        }

        // ── Utilities ─────────────────────────────────────────────
        function togglePassword(inputId, btn) {
            const input = document.getElementById(inputId);
            const isPassword = input.type === 'password';
            input.type = isPassword ? 'text' : 'password';
            btn.innerHTML = isPassword 
                ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
                : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
        }

        function showToast(message, isSuccess) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isSuccess ? ' success' : '');
            requestAnimationFrame(() => toast.classList.add('show'));
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function navigateWithSpinner(e, url) {
            e.preventDefault();
            const overlay = document.getElementById('spinnerOverlay');
            overlay.classList.add('active');
            setTimeout(() => { window.location.href = url; }, 1200);
            return false;
        }

        const rememberedEmail = localStorage.getItem('pinkApp_rememberEmail');
        if (rememberedEmail) {
            document.getElementById('loginEmail').value = rememberedEmail;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>History — Pink App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-50: #fff0f3;
            --pink-100: #ffd6e0;
            --pink-400: #ff6b8a;
            --pink-500: #fe2c55;
            --pink-600: #e01a3f;
            --pink-glow: rgba(254, 44, 85, 0.35);
            --cyan: #25f4ee;
            --gold: #ffd700;
            --bg-base: #07070a;
            --bg-elevated: #0f0f14;
            --bg-surface: rgba(255, 255, 255, 0.025);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-highlight: rgba(255, 255, 255, 0.08);
            --text-primary: #f5f5f7;
            --text-secondary: rgba(255, 255, 255, 0.55);
            --text-tertiary: rgba(255, 255, 255, 0.35);
            --text-muted: rgba(255, 255, 255, 0.25);
            --success: #34d399;
            --success-bg: rgba(52, 211, 153, 0.1);
            --warning: #fbbf24;
            --warning-bg: rgba(251, 191, 36, 0.1);
            --error: #f87171;
            --error-bg: rgba(248, 113, 113, 0.1);
            --mono: 'IBM Plex Mono', monospace;
            --spring: cubic-bezier(0.23, 1, 0.32, 1);
            --smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg-base); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; position: relative; -webkit-font-smoothing: antialiased; }

        .ambient-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.35; animation: orbFloat 20s ease-in-out infinite; }
        .orb-1 { width: 350px; height: 350px; background: var(--pink-500); top: -120px; right: -100px; }
        .orb-2 { width: 280px; height: 280px; background: var(--cyan); bottom: 15%; left: -100px; opacity: 0.15; animation-delay: -7s; }
        .orb-3 { width: 220px; height: 220px; background: var(--gold); top: 45%; left: 55%; opacity: 0.08; animation-delay: -14s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(30px,-20px) scale(1.05)} 66%{transform:translate(-20px,15px) scale(0.95)} }
        .grain { position: fixed; inset: 0; z-index: 1; opacity: 0.025; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

        .app-container { position: relative; z-index: 2; max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 24px; }

        /* HEADER */
        .header { position: sticky; top: 0; z-index: 100; background: rgba(7,7,10,0.85); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%); padding: 0.875rem 1.25rem; display: flex; align-items: center; gap: 0.75rem; border-bottom: 1px solid var(--glass-border); }
        .back-btn { width: 38px; height: 38px; background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); cursor: pointer; transition: all 0.25s var(--spring); flex-shrink: 0; }
        .back-btn:active { transform: scale(0.92); background: var(--glass-highlight); }
        .back-btn svg { width: 18px; height: 18px; stroke-width: 2.5; }
        .header-title { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em; flex: 1; }
        .export-btn { padding: 0.5rem 0.875rem; background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-secondary); font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.25s var(--spring); display: flex; align-items: center; gap: 0.375rem; flex-shrink: 0; }
        .export-btn:active { transform: scale(0.95); background: var(--glass-highlight); }
        .export-btn svg { width: 14px; height: 14px; stroke-width: 2; }

        /* SUMMARY CARDS */
        .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.625rem; padding: 1rem 1.25rem 0.75rem; }
        .summary-card { background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: 16px; padding: 1rem 0.5rem; text-align: center; position: relative; overflow: hidden; transition: all 0.3s var(--spring); }
        .summary-card::before { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent); pointer-events: none; }
        .summary-card.in { border-color: rgba(52,211,153,0.15); }
        .summary-card.out { border-color: rgba(248,113,113,0.15); }
        .summary-card.net { border-color: rgba(251,191,36,0.15); }
        .summary-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin: 0 auto 0.5rem; }
        .summary-icon svg { width: 14px; height: 14px; stroke-width: 2.5; }
        .summary-value { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; font-variant-numeric: tabular-nums; }
        .summary-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }

        /* FILTER TABS */
        .filter-tabs { display: flex; gap: 0.5rem; padding: 0 1.25rem 0.75rem; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
        .filter-tabs::-webkit-scrollbar { display: none; }
        .filter-tab { padding: 0.5rem 1rem; background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-secondary); font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: all 0.25s var(--spring); white-space: nowrap; flex-shrink: 0; }
        .filter-tab.active { background: linear-gradient(135deg, var(--pink-500), var(--pink-600)); color: white; border-color: transparent; box-shadow: 0 2px 12px rgba(254,44,85,0.25); }
        .filter-tab:active { transform: scale(0.95); }

        /* SEARCH */
        .search-bar { margin: 0 1.25rem 0.75rem; position: relative; }
        .search-input { width: 100%; background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: 12px; padding: 0.625rem 0.875rem 0.625rem 2.5rem; color: var(--text-primary); font-size: 0.85rem; outline: none; transition: all 0.2s; }
        .search-input:focus { border-color: rgba(254,44,85,0.3); background: rgba(255,255,255,0.05); }
        .search-input::placeholder { color: var(--text-muted); }
        .search-icon { position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
        .search-icon svg { width: 16px; height: 16px; stroke-width: 2; }

        /* TRANSACTION LIST */
        .tx-section { padding: 0 1.25rem; }
        .tx-date-group { margin-bottom: 1rem; }
        .tx-date-header { font-size: 0.7rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 0.5rem; padding-left: 0.25rem; }
        .tx-item { display: flex; align-items: center; gap: 0.875rem; padding: 0.875rem; background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: 14px; margin-bottom: 0.5rem; cursor: pointer; transition: all 0.2s var(--spring); animation: fadeUp 0.4s var(--spring) both; }
        .tx-item:active { transform: scale(0.98); background: var(--glass-highlight); }
        .tx-icon-wrap { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .tx-icon-wrap svg { width: 18px; height: 18px; stroke-width: 2; }
        .tx-details { flex: 1; min-width: 0; }
        .tx-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tx-meta { display: flex; align-items: center; gap: 0.5rem; }
        .tx-time { font-size: 0.7rem; color: var(--text-muted); }
        .tx-status { font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; padding: 1px 6px; border-radius: 4px; }
        .tx-status.completed { background: var(--success-bg); color: var(--success); }
        .tx-status.pending { background: var(--warning-bg); color: var(--warning); }
        .tx-status.failed { background: var(--error-bg); color: var(--error); }
        .tx-amount { font-size: 0.9rem; font-weight: 700; text-align: right; font-variant-numeric: tabular-nums; flex-shrink: 0; }
        .tx-amount.in { color: var(--success); }
        .tx-amount.out { color: var(--error); }

        /* EMPTY STATE */
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 3rem 1rem; text-align: center; gap: 0.75rem; }
        .empty-icon { width: 56px; height: 56px; border-radius: 18px; background: var(--bg-surface); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; margin-bottom: 0.5rem; }
        .empty-icon svg { width: 24px; height: 24px; color: var(--text-muted); }
        .empty-title { font-size: 0.9rem; font-weight: 600; color: var(--text-secondary); }
        .empty-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.5; max-width: 240px; }

        /* DETAIL MODAL */
        .modal-overlay { position: fixed; inset: 0; z-index: 2500; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: none; align-items: flex-end; justify-content: center; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-sheet { background: var(--bg-elevated); border-top: 1px solid var(--glass-border); border-radius: 24px 24px 0 0; width: 100%; max-width: 480px; padding: 1.5rem; transform: translateY(100%); transition: transform 0.4s var(--spring); }
        .modal-overlay.active .modal-sheet { transform: translateY(0); }
        .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--glass-border); margin: 0 auto 1.25rem; }
        .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.25rem; }
        .modal-desc { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 1.5rem; }
        .modal-row { display: flex; justify-content: space-between; align-items: center; padding: 0.875rem 0; border-bottom: 1px solid var(--glass-border); }
        .modal-row:last-child { border-bottom: none; }
        .modal-label { font-size: 0.8rem; color: var(--text-secondary); }
        .modal-value { font-size: 0.85rem; font-weight: 600; font-family: var(--mono); }
        .btn { padding: 0.875rem; border-radius: 14px; border: none; font-size: 0.85rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.25s var(--spring); position: relative; overflow: hidden; width: 100%; margin-top: 1rem; }
        .btn:active { transform: scale(0.96); }
        .btn-secondary { background: var(--bg-surface); border: 1px solid var(--glass-border); color: var(--text-primary); }

        /* SPINNER */
        .spinner-overlay { position: fixed; inset: 0; background: rgba(7,7,10,0.95); backdrop-filter: blur(20px); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 1.25rem; }
        .spinner-overlay.active { display: flex; }
        .spinner-ring { width: 48px; height: 48px; position: relative; }
        .spinner-ring::before { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--pink-500); border-right-color: var(--pink-400); animation: spin 0.8s linear infinite; }
        .spinner-ring::after { content: ''; position: absolute; inset: 6px; border-radius: 50%; border: 3px solid transparent; border-bottom-color: var(--cyan); border-left-color: var(--gold); animation: spin 1.2s linear infinite reverse; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }



        /* TOAST */
        .toast-container { position: fixed; top: 1rem; left: 50%; transform: translateX(-50%); z-index: 4000; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; width: 90%; max-width: 400px; }
        .toast { background: rgba(15,15,20,0.95); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); color: white; padding: 0.875rem 1.25rem; border-radius: 14px; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 0.625rem; box-shadow: 0 10px 40px rgba(0,0,0,0.4); transform: translateY(-20px); opacity: 0; transition: all 0.4s var(--spring); pointer-events: auto; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: rgba(52,211,153,0.3); }
        .toast.error { border-color: rgba(248,113,113,0.3); }
        .toast-icon { width: 18px; height: 18px; flex-shrink: 0; }

        /* SYNC STATUS */
        .sync-status { display: flex; align-items: center; justify-content: center; gap: 0.375rem; padding: 0.375rem 1.25rem; font-size: 0.65rem; color: var(--text-muted); font-weight: 500; }
        .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>
<div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>
<div class="grain"></div>

<div class="app-container">
    <header class="header">
        <div class="back-btn" onclick="navigateTo('pink-dashboard.html')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div class="header-title">Transaction History</div>
        <button class="export-btn" onclick="exportCSV()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export
        </button>
    </header>

    <div class="sync-status" id="syncStatus">
        <span class="sync-dot"></span>
        <span>Syncing with cloud...</span>
    </div>

    <div class="summary-grid">
        <div class="summary-card in">
            <div class="summary-icon" style="background:var(--success-bg);color:var(--success);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
            </div>
            <div class="summary-value" id="totalIn">₦0.00</div>
            <div class="summary-label">Total In</div>
        </div>
        <div class="summary-card out">
            <div class="summary-icon" style="background:var(--error-bg);color:var(--error);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
            </div>
            <div class="summary-value" id="totalOut">₦0.00</div>
            <div class="summary-label">Total Out</div>
        </div>
        <div class="summary-card net">
            <div class="summary-icon" style="background:rgba(251,191,36,0.1);color:var(--gold);">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <div class="summary-value" id="totalNet">₦0.00</div>
            <div class="summary-label">Net</div>
        </div>
    </div>

    <div class="filter-tabs" id="filterTabs">
        <div class="filter-tab active" data-filter="all" onclick="setFilter('all')">All</div>
        <div class="filter-tab" data-filter="video" onclick="setFilter('video')">Earnings</div>
        <div class="filter-tab" data-filter="withdrawal" onclick="setFilter('withdrawal')">Withdrawals</div>
        <div class="filter-tab" data-filter="referral" onclick="setFilter('referral')">Referrals</div>
        <div class="filter-tab" data-filter="daily" onclick="setFilter('daily')">Rewards</div>
    </div>

    <div class="search-bar">
        <div class="search-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <input type="text" class="search-input" id="searchInput" placeholder="Search transactions..." oninput="filterTransactions()">
    </div>

    <div class="tx-section" id="txSection"></div>
</div>



<div class="spinner-overlay" id="spinnerOverlay">
    <div class="spinner-ring"></div>
    <div style="color:var(--text-secondary);font-size:0.85rem;font-weight:500;letter-spacing:0.5px;">Loading...</div>
</div>

<div class="modal-overlay" id="txModal" onclick="closeModal(event)">
    <div class="modal-sheet" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-title">Transaction Details</div>
        <div class="modal-desc">Reference: <span id="modalRef" style="font-family:var(--mono);color:var(--text-secondary);">—</span></div>
        <div class="modal-row"><span class="modal-label">Type</span><span class="modal-value" id="modalType">—</span></div>
        <div class="modal-row"><span class="modal-label">Amount</span><span class="modal-value" id="modalAmount">—</span></div>
        <div class="modal-row"><span class="modal-label">Status</span><span class="modal-value" id="modalStatus" style="color:var(--success);">—</span></div>
        <div class="modal-row"><span class="modal-label">Date</span><span class="modal-value" id="modalDate">—</span></div>
        <div class="modal-row"><span class="modal-label">Balance After</span><span class="modal-value" id="modalBalance">—</span></div>
        <button class="btn btn-secondary" onclick="closeModal()">Close</button>
    </div>
</div>

<div class="toast-container" id="toastContainer"></div>

function fmtMoney(amount, currency, symbol) {
    if (!currency || !symbol) {
        var cfg = COUNTRY_CONFIG[userCountry] || COUNTRY_CONFIG['NG'];
        currency = cfg.currency; symbol = cfg.symbol;
    }
    var safe = (amount == null || isNaN(amount)) ? 0 : amount;
    try {
        return new Intl.NumberFormat('en-US', {style:'currency',currency:currency,minimumFractionDigits:2})
            .format(safe).replace(/[A-Z]{3}/, symbol);
    } catch(e) { return symbol + safe.toFixed(2); }
}

function fmtCoins(n) {
    return new Intl.NumberFormat('en-US').format((n == null || isNaN(n)) ? 0 : n);
}

function getTimeAgo(dateStr) {
    if (!dateStr) return 'Just now';
    var date = new Date(dateStr);
    var secs = Math.floor((Date.now() - date) / 1000);
    if (secs < 60) return 'Just now';
    var m = Math.floor(secs/60); if (m < 60) return m + 'm ago';
    var h = Math.floor(m/60);   if (h < 24) return h + 'h ago';
    var d = Math.floor(h/24);   if (d < 7)  return d + 'd ago';
    return date.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

function groupByDate(transactions) {
    var groups = {};
    transactions.forEach(function(tx) {
        var date = new Date(tx.time || Date.now());
        var key = date.toDateString();
        if (!groups[key]) groups[key] = [];
        groups[key].push(tx);
    });
    var sortedKeys = Object.keys(groups).sort(function(a,b) {
        return new Date(b) - new Date(a);
    });
    var result = [];
    sortedKeys.forEach(function(key) {
        result.push({ date: key, items: groups[key].sort(function(a,b) {
            return new Date(b.time) - new Date(a.time);
        })});
    });
    return result;
}

function renderTransactions() {
    var section = document.getElementById('txSection');
    var cfg = COUNTRY_CONFIG[userCountry] || COUNTRY_CONFIG['NG'];

    var filtered = allTransactions.filter(function(tx) {
        if (currentFilter !== 'all' && tx.type !== currentFilter) return false;
        if (currentSearch) {
            var search = currentSearch.toLowerCase();
            var conf = ACTIVITY_CONFIG[tx.type] || ACTIVITY_CONFIG.video;
            return (conf.label.toLowerCase().indexOf(search) !== -1) ||
                   (tx.ref || '').toLowerCase().indexOf(search) !== -1 ||
                   (tx.status || '').toLowerCase().indexOf(search) !== -1;
        }
        return true;
    });

    if (filtered.length === 0) {
        section.innerHTML =
            '<div class="empty-state">' +
                '<div class="empty-icon">' +
                    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg>' +
                '</div>' +
                '<div class="empty-title">No transactions found</div>' +
                '<div class="empty-desc">Start earning by watching videos, claiming daily rewards, or referring friends.</div>' +
            '</div>';
        updateSummary([]);
        return;
    }

    var groups = groupByDate(filtered);
    var html = '';
    groups.forEach(function(g, gi) {
        var dateLabel = new Date(g.date).toLocaleDateString('en-US', {weekday:'long', month:'short', day:'numeric'});
        if (g.date === new Date().toDateString()) dateLabel = 'Today';
        var yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
        if (g.date === yesterday.toDateString()) dateLabel = 'Yesterday';

        html += '<div class="tx-date-group" style="animation:fadeUp 0.4s ' + (gi*0.05) + 's var(--spring) both;">';
        html += '<div class="tx-date-header">' + dateLabel + '</div>';
        g.items.forEach(function(tx, ti) {
            var conf = ACTIVITY_CONFIG[tx.type] || ACTIVITY_CONFIG.video;
            var amt = (tx.amount || 0) * cfg.rate;
            var val = fmtMoney(amt, cfg.currency, cfg.symbol).replace('.00','');
            var isIn = conf.in !== false;
            var status = tx.status || 'completed';

            html += '<div class="tx-item" onclick="openTxDetail(\'' + (tx.ref || '') + '\')" style="animation:fadeUp 0.4s ' + (ti*0.03) + 's var(--spring) both;">' +
                '<div class="tx-icon-wrap" style="background:' + conf.bg + ';color:' + conf.color + ';">' + conf.icon + '</div>' +
                '<div class="tx-details">' +
                    '<div class="tx-title">' + conf.label + '</div>' +
                    '<div class="tx-meta">' +
                        '<span class="tx-time">' + getTimeAgo(tx.time) + '</span>' +
                        '<span class="tx-status ' + status + '">' + status + '</span>' +
                    '</div>' +
                '</div>' +
                '<div class="tx-amount ' + (isIn ? 'in' : 'out') + '">' + (isIn ? '+' : '-') + val + '</div>' +
            '</div>';
        });
        html += '</div>';
    });

    section.innerHTML = html;
    updateSummary(filtered);
}

function updateSummary(transactions) {
    var cfg = COUNTRY_CONFIG[userCountry] || COUNTRY_CONFIG['NG'];
    var totalIn = 0, totalOut = 0;
    transactions.forEach(function(tx) {
        var conf = ACTIVITY_CONFIG[tx.type] || ACTIVITY_CONFIG.video;
        var amt = (tx.amount || 0) * cfg.rate;
        if (conf.in !== false) totalIn += amt;
        else totalOut += amt;
    });
    document.getElementById('totalIn').textContent = fmtMoney(totalIn, cfg.currency, cfg.symbol).replace('.00','');
    document.getElementById('totalOut').textContent = fmtMoney(totalOut, cfg.currency, cfg.symbol).replace('.00','');
    document.getElementById('totalNet').textContent = fmtMoney(totalIn - totalOut, cfg.currency, cfg.symbol).replace('.00','');
}

function exportCSV() {
    var cfg = COUNTRY_CONFIG[userCountry] || COUNTRY_CONFIG['NG'];
    var csv = 'Date,Type,Amount (' + cfg.symbol + '),Status,Reference\n';
    allTransactions.forEach(function(tx) {

        csv += '"' + (tx.time ? new Date(tx.time).toISOString() : '') + '",' +
               '"' + conf.label + '",' +
               amt.toFixed(2) + ',' +
               (tx.status || 'completed') + ',' +
               (tx.ref || '') + '\n';

    toast.innerHTML = icon + '<span>' + message + '</span>';

/* ============================================================
   MERGE localStorage + Firestore transactions
   ============================================================ */
function mergeTransactions(fsActivities, localActivities) {
    var merged = {};
    var syncedRefs = new Set();

    // First: add all Firestore activities
    fsActivities.forEach(function(tx) {
        var ref = tx.ref || tx.id || ('fs-' + Math.random().toString(36).substr(2,9));
        merged[ref] = {
            ref: ref,
            type: tx.type || 'video',
            amount: parseFloat(tx.amount) || 0,
            status: tx.status || 'completed',
            time: tx.time || new Date().toISOString(),
            balanceAfter: parseInt(tx.balanceAfter) || 0,
            source: 'firestore'
        };
        syncedRefs.add(ref);
    });

    // Second: add localStorage activities (dashboard-generated)
    // If same ref exists in Firestore, keep Firestore version (it's newer)
    localActivities.forEach(function(tx) {
        var ref = tx.ref || ('local-' + Math.random().toString(36).substr(2,9));
        if (!merged[ref]) {
            merged[ref] = {
                ref: ref,
                type: tx.type || 'video',
                amount: parseFloat(tx.amount) || 0,
                status: tx.status || 'completed',
                time: tx.time || new Date().toISOString(),
                balanceAfter: parseInt(tx.balanceAfter) || 0,
                source: 'local'
            };
        }
    });

    // Convert to array and sort by time desc
    var arr = Object.values(merged);
    arr.sort(function(a,b) {
        return new Date(b.time) - new Date(a.time);
    });
    return arr;
}

/* ============================================================
   SYNC missing local transactions TO Firestore — FIXED VERSION
   Uploads ALL local activities (including local-* refs) to Firestore
   and retries every 30 seconds until all are synced
   ============================================================ */
var syncInProgress = false;
var syncRetryTimer = null;

async function syncLocalToFirestore(db, uid, localActivities) {
    if (!db || !uid || !localActivities.length || syncInProgress) return;
    syncInProgress = true;

    try {
        var { collection, addDoc, serverTimestamp, query, where, getDocs } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
        var syncedCount = 0;

        // Get all existing refs in Firestore to avoid duplicates
        var existingRefs = new Set();
        var fsQuery = query(collection(db, 'users', uid, 'activities'));
        var fsSnap = await getDocs(fsQuery);
        fsSnap.forEach(function(doc) {
            var data = doc.data();
            if (data.ref) existingRefs.add(data.ref);
        });

        for (var i = 0; i < localActivities.length; i++) {
            var tx = localActivities[i];
            var ref = tx.ref || ('local-' + Date.now() + '-' + i);

            // Skip if this exact ref already exists in Firestore
            if (existingRefs.has(ref)) continue;

            // Upload this local transaction to Firestore
            await addDoc(collection(db, 'users', uid, 'activities'), {
                type: tx.type || 'video',
                amount: parseFloat(tx.amount) || 0,
                ref: ref,
                status: tx.status || 'completed',
                time: tx.time || new Date().toISOString(),
                balanceAfter: parseInt(tx.balanceAfter) || 0,
                source: tx.source || 'local-sync',
                syncedAt: serverTimestamp()
            });
            syncedCount++;
        }

        if (syncedCount > 0) {
            updateSyncStatus(syncedCount + ' transaction(s) synced to cloud', false);
            showToast(syncedCount + ' activities synced to cloud', true);
        } else {
            updateSyncStatus('All data synced', false);
        }

        // Clear retry timer since sync succeeded
        if (syncRetryTimer) {
            clearTimeout(syncRetryTimer);
            syncRetryTimer = null;
        }

    } catch(e) {
        console.error('Sync to Firestore failed:', e);
        updateSyncStatus('Sync error — will retry', false);
        showToast('Sync failed — retrying in 30s', false);

        // Retry in 30 seconds
        if (syncRetryTimer) clearTimeout(syncRetryTimer);
        syncRetryTimer = setTimeout(function() {
            syncInProgress = false;
            var localActivities = [];
            try {
                localActivities = JSON.parse(localStorage.getItem('pinkApp_activities') || '[]');
            } catch(e) { localActivities = []; }
            syncLocalToFirestore(db, uid, localActivities);
        }, 30000);
    } finally {
        syncInProgress = false;
    }
}
</script>

    }
  });

  // ── ACTIVITIES SYNC (Firestore + localStorage merge) ──
  if (unsubActivities) unsubActivities();
  const activitiesQuery = query(
    collection(db, 'users', user.uid, 'activities'),
    orderBy('time', 'desc'),
    limit(100)
  );

  unsubActivities = onSnapshot(activitiesQuery, async (snap) => {
    var fsActivities = [];
    snap.forEach(docSnap => {
      var data = docSnap.data();
      fsActivities.push({
        id: docSnap.id,
        type: data.type,
        amount: data.amount,
        ref: data.ref,
        status: data.status,
        time: data.time,
        balanceAfter: data.balanceAfter
      });
    });

    // Read localStorage activities from dashboard
    var localActivities = [];
    try {
      localActivities = JSON.parse(localStorage.getItem('pinkApp_activities') || '[]');
    } catch(e) { localActivities = []; }

    // Merge both sources (deduplicated by ref)
    window.allTransactions = window.mergeTransactions(fsActivities, localActivities);

    // Update localStorage with merged data so dashboard sees it too
    localStorage.setItem('pinkApp_activities', JSON.stringify(window.allTransactions));

    // Render
    window.renderTransactions();

    // Sync any missing local transactions TO Firestore (runs every time, not just once)
    var localActivitiesFresh = [];
    try {
      localActivitiesFresh = JSON.parse(localStorage.getItem('pinkApp_activities') || '[]');
    } catch(e) { localActivitiesFresh = []; }
    await window.syncLocalToFirestore(db, user.uid, localActivitiesFresh);

  }, (err) => {
    console.error('Activity sync error:', err);
    window.updateSyncStatus('Sync error — showing cached data', false);
    // Fallback: show localStorage only
    var localActivities = JSON.parse(localStorage.getItem('pinkApp_activities') || '[]');
    window.allTransactions = window.mergeTransactions([], localActivities);
    window.renderTransactions();
  });

  /* ── Withdrawals sync ── */
  if (unsubWithdrawals) unsubWithdrawals();
  const withdrawalsQuery = query(
    collection(db, 'pendingWithdrawals'),
    where('userId', '==', user.uid),
    orderBy('timestamp', 'desc'),
    limit(50)
  );
  unsubWithdrawals = onSnapshot(withdrawalsQuery, (snap) => {
    var withdrawals = [];
    snap.forEach((docSnap) => {
      var w = docSnap.data();
      var rawStatus = w.status || 'pending';
      // For admin accounts, show "completed" instead of "approved"
      var isAdmin = (window.pinkAppIsAdmin === true);
      var displayStatus = (rawStatus === 'approved' && isAdmin) ? 'completed' : rawStatus;
      withdrawals.push({
        ref: 'WD-' + docSnap.id,
        type: 'withdrawal',
        amount: w.coins || 0,
        status: displayStatus,
        time: w.timestamp ? (w.timestamp.toDate ? w.timestamp.toDate().toISOString() : w.timestamp) : new Date().toISOString(),
        balanceAfter: w.coins ? (window.userCoins || 0) : 0,
        source: 'withdrawal'
      });
    });

    // Merge withdrawals into allTransactions
    var currentTxs = window.allTransactions || [];
    var merged = {};
    currentTxs.forEach(function(tx) {
      merged[tx.ref] = tx;
    });
    withdrawals.forEach(function(w) {
      if (!merged[w.ref]) {
        merged[w.ref] = w;
      } else {
        // Update status if changed
        merged[w.ref].status = w.status;
      }
    });
    var arr = Object.values(merged);
    arr.sort(function(a,b) {
      return new Date(b.time) - new Date(a.time);
    });
    window.allTransactions = arr;
    localStorage.setItem('pinkApp_activities', JSON.stringify(arr.slice(0, 100)));
    window.renderTransactions();
    window.updateSyncStatus('All data synced', false);
  }, (err) => {
    console.error('Withdrawals sync error:', err);
  });
});
</script>
</body>
</html>

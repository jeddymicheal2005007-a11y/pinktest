<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Notifications — Pink App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-50: #fff0f3;
            --pink-100: #ffd6e0;
            --pink-400: #ff6b8a;
            --pink-500: #fe2c55;
            --pink-600: #e01a3f;
            --pink-glow: rgba(254, 44, 85, 0.35);
            --cyan: #25f4ee;
            --gold: #ffd700;
            --bg-base: #07070a;
            --bg-elevated: #0f0f14;
            --bg-surface: rgba(255, 255, 255, 0.025);
            --glass-border: rgba(255, 255, 255, 0.06);
            --glass-highlight: rgba(255, 255, 255, 0.08);
            --text-primary: #f5f5f7;
            --text-secondary: rgba(255, 255, 255, 0.55);
            --text-tertiary: rgba(255, 255, 255, 0.35);
            --text-muted: rgba(255, 255, 255, 0.25);
            --success: #34d399;
            --success-bg: rgba(52, 211, 153, 0.1);
            --warning: #fbbf24;
            --warning-bg: rgba(251, 191, 36, 0.1);
            --error: #f87171;
            --error-bg: rgba(248, 113, 113, 0.1);
            --info: #60a5fa;
            --info-bg: rgba(96, 165, 250, 0.1);
            --mono: 'IBM Plex Mono', monospace;
            --spring: cubic-bezier(0.23, 1, 0.32, 1);
            --smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        html { scroll-behavior: smooth; }
        body { background: var(--bg-base); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; position: relative; -webkit-font-smoothing: antialiased; }

        .ambient-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .orb { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.35; animation: orbFloat 20s ease-in-out infinite; }
        .orb-1 { width: 350px; height: 350px; background: var(--pink-500); top: -120px; right: -100px; }
        .orb-2 { width: 280px; height: 280px; background: var(--cyan); bottom: 15%; left: -100px; opacity: 0.15; animation-delay: -7s; }
        .orb-3 { width: 220px; height: 220px; background: var(--gold); top: 45%; left: 55%; opacity: 0.08; animation-delay: -14s; }
        @keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(30px,-20px) scale(1.05)} 66%{transform:translate(-20px,15px) scale(0.95)} }
        .grain { position: fixed; inset: 0; z-index: 1; opacity: 0.025; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); }

        .app-container { position: relative; z-index: 2; max-width: 480px; margin: 0 auto; min-height: 100vh; padding-bottom: 40px; }

        /* HEADER */
        .header { position: sticky; top: 0; z-index: 100; background: rgba(7,7,10,0.85); backdrop-filter: blur(40px) saturate(180%); -webkit-backdrop-filter: blur(40px) saturate(180%); padding: 0.875rem 1.25rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--glass-border); }
        .header-left { display: flex; align-items: center; gap: 0.875rem; }
        .back-btn { width: 38px; height: 38px; background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); cursor: pointer; transition: all 0.25s var(--spring); }
        .back-btn:active { transform: scale(0.92); background: var(--glass-highlight); }
        .back-btn svg { width: 18px; height: 18px; stroke-width: 2.5; }
        .header-title { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em; }
        .header-actions { display: flex; align-items: center; gap: 0.5rem; }
        .mark-all-btn { font-size: 0.75rem; font-weight: 600; color: var(--pink-400); background: none; border: none; cursor: pointer; padding: 6px 12px; border-radius: 8px; transition: all 0.2s; }
        .mark-all-btn:active { background: rgba(254,44,85,0.1); }
        .mark-all-btn:disabled { color: var(--text-muted); cursor: not-allowed; opacity: 0.5; }

        /* FILTER TABS */
        .filter-tabs { display: flex; gap: 0.5rem; padding: 0.875rem 1.25rem; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; }
        .filter-tabs::-webkit-scrollbar { display: none; }
        .filter-tab { padding: 0.5rem 1rem; border-radius: 10px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.25s var(--spring); white-space: nowrap; border: 1px solid var(--glass-border); background: var(--bg-surface); color: var(--text-secondary); user-select: none; }
        .filter-tab:active { transform: scale(0.95); }
        .filter-tab.active { background: linear-gradient(135deg, rgba(254,44,85,0.15), rgba(254,44,85,0.05)); border-color: rgba(254,44,85,0.25); color: var(--pink-400); }
        .filter-tab .count { font-size: 0.65rem; margin-left: 4px; opacity: 0.7; }

        /* NOTIFICATION LIST */
        .notif-list { padding: 0 1.25rem; }
        .notif-item { display: flex; align-items: flex-start; gap: 0.875rem; padding: 1rem; background: var(--bg-surface); border: 1px solid var(--glass-border); border-radius: 16px; margin-bottom: 0.625rem; cursor: pointer; transition: all 0.25s var(--spring); position: relative; overflow: hidden; animation: fadeUp 0.4s var(--spring) both; }
        .notif-item:active { transform: scale(0.98); background: var(--glass-highlight); }
        .notif-item.unread { border-color: rgba(254,44,85,0.15); background: linear-gradient(135deg, rgba(254,44,85,0.04), var(--bg-surface)); }
        .notif-item.unread::before { content: ''; position: absolute; left: 0; top: 20%; bottom: 20%; width: 3px; background: linear-gradient(to bottom, var(--pink-500), var(--pink-400)); border-radius: 0 3px 3px 0; }
        .notif-item.read { opacity: 0.7; }
        .notif-item.read .notif-title { color: var(--text-secondary); }
        .notif-item.read .notif-icon { opacity: 0.5; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

        .notif-icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1rem; }
        .notif-icon.success { background: var(--success-bg); color: var(--success); }
        .notif-icon.error { background: var(--error-bg); color: var(--error); }
        .notif-icon.warning { background: var(--warning-bg); color: var(--warning); }
        .notif-icon.info { background: var(--info-bg); color: var(--info); }
        .notif-icon.announcement { background: linear-gradient(135deg, rgba(254,44,85,0.12), rgba(168,85,247,0.08)); color: var(--pink-400); }

        .notif-content { flex: 1; min-width: 0; }
        .notif-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 3px; line-height: 1.3; }
        .notif-message { font-size: 0.75rem; color: var(--text-tertiary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .notif-meta { display: flex; align-items: center; gap: 0.5rem; margin-top: 6px; }
        .notif-time { font-size: 0.65rem; color: var(--text-muted); font-family: var(--mono); }
        .notif-type-badge { font-size: 0.55rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 6px; border-radius: 4px; }
        .notif-type-badge.activation { background: var(--success-bg); color: var(--success); }
        .notif-type-badge.payment { background: var(--error-bg); color: var(--error); }
        .notif-type-badge.announcement { background: rgba(254,44,85,0.1); color: var(--pink-400); }
        .notif-type-badge.system { background: var(--info-bg); color: var(--info); }
        .notif-type-badge.referral { background: rgba(37,244,238,0.1); color: var(--cyan); }

        .notif-actions { display: flex; flex-direction: column; gap: 0.375rem; align-items: center; }
        .notif-action-btn { width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--glass-border); background: transparent; color: var(--text-muted); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.7rem; transition: all 0.2s; }
        .notif-action-btn:active { background: var(--glass-highlight); color: var(--text-primary); }
        .notif-action-btn.delete:active { color: var(--error); border-color: rgba(248,113,113,0.3); }

        /* UNREAD DOT */
        .unread-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--pink-500); box-shadow: 0 0 8px var(--pink-glow); position: absolute; top: 12px; right: 12px; animation: dotPulse 2s infinite; }
        @keyframes dotPulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.3);opacity:0.7} }

        /* EMPTY STATE */
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 1.5rem; text-align: center; gap: 0.875rem; }
        .empty-icon { width: 64px; height: 64px; border-radius: 20px; background: var(--bg-surface); border: 1px solid var(--glass-border); display: flex; align-items: center; justify-content: center; margin-bottom: 0.5rem; }
        .empty-icon svg { width: 28px; height: 28px; color: var(--text-muted); }
        .empty-title { font-size: 1rem; font-weight: 700; color: var(--text-secondary); }
        .empty-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; max-width: 260px; }

        /* SPINNER */
        .spinner-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 1.5rem; gap: 1rem; }
        .spinner { width: 32px; height: 32px; border: 2px solid transparent; border-top-color: var(--pink-500); border-right-color: var(--pink-400); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner-text { font-size: 0.8rem; color: var(--text-muted); }

        /* TOAST */
        .toast-container { position: fixed; top: 1rem; left: 50%; transform: translateX(-50%); z-index: 4000; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: none; width: 90%; max-width: 400px; }
        .toast { background: rgba(15,15,20,0.95); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); color: white; padding: 0.875rem 1.25rem; border-radius: 14px; font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 0.625rem; box-shadow: 0 10px 40px rgba(0,0,0,0.4); transform: translateY(-20px); opacity: 0; transition: all 0.4s var(--spring); pointer-events: auto; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: rgba(52,211,153,0.3); }
        .toast.error { border-color: rgba(248,113,113,0.3); }
        .toast-icon { width: 18px; height: 18px; flex-shrink: 0; }

        /* SPINNER OVERLAY */
        .spinner-overlay { position: fixed; inset: 0; background: rgba(7,7,10,0.95); backdrop-filter: blur(20px); z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 1.25rem; }
        .spinner-overlay.active { display: flex; }
        .spinner-ring { width: 48px; height: 48px; position: relative; }
        .spinner-ring::before { content: ''; position: absolute; inset: 0; border-radius: 50%; border: 3px solid transparent; border-top-color: var(--pink-500); border-right-color: var(--pink-400); animation: spin 0.8s linear infinite; }
        .spinner-ring::after { content: ''; position: absolute; inset: 6px; border-radius: 50%; border: 3px solid transparent; border-bottom-color: var(--cyan); border-left-color: var(--gold); animation: spin 1.2s linear infinite reverse; }

        @media (prefers-reduced-motion: reduce) { *,*::before,*::after{animation-duration:0.01ms !important;transition-duration:0.01ms !important} }
    </style>
</head>
<body>
<div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
</div>
<div class="grain"></div>

<div class="app-container">
    <header class="header">
        <div class="header-left">
            <div class="back-btn" id="backBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </div>
            <div class="header-title">Notifications</div>
        </div>
        <div class="header-actions">
            <button class="mark-all-btn" id="markAllBtn" disabled>Mark all read</button>
        </div>
    </header>

    <div class="filter-tabs" id="filterTabs">
        <div class="filter-tab active" data-filter="all">All <span class="count" id="countAll"></span></div>
        <div class="filter-tab" data-filter="unread">Unread <span class="count" id="countUnread"></span></div>
        <div class="filter-tab" data-filter="activation">Activation</div>
        <div class="filter-tab" data-filter="payment">Payments</div>
        <div class="filter-tab" data-filter="announcement">Announcements</div>
    </div>

    <div class="notif-list" id="notifList">
        <div class="spinner-wrap">
            <div class="spinner"></div>
            <div class="spinner-text">Loading notifications...</div>
        </div>
    </div>
</div>

<div class="spinner-overlay" id="spinnerOverlay">
    <div class="spinner-ring"></div>
    <div style="color:var(--text-secondary);font-size:0.85rem;font-weight:500;letter-spacing:0.5px;">Loading...</div>
</div>
<div class="toast-container" id="toastContainer"></div>

<!-- Firebase loaded as module -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, doc, onSnapshot, query, orderBy, updateDoc, deleteDoc, addDoc, serverTimestamp, where, getDocs, getDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBUEKYA5x1T2Qb3T8Z6rP5qv5jmfTXlRU0",
    authDomain: "pink-app-5ecd1.firebaseapp.com",
    databaseURL: "https://pink-app-5ecd1-default-rtdb.firebaseio.com",
    projectId: "pink-app-5ecd1",
    storageBucket: "pink-app-5ecd1.firebasestorage.app",
    messagingSenderId: "659145722582",
    appId: "1:659145722582:web:1e0778ce8aa62dff129777",
    measurementId: "G-G299LL6DM6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allNotifs = [];
let currentFilter = 'all';
let unsubNotifs = null;

// ── Helpers ──────────────────────────────────────────────────────────────────

function navigateTo(url) {
    document.getElementById('spinnerOverlay').classList.add('active');
    setTimeout(() => { window.location.href = url; }, 600);
}

function showToast(message, isSuccess) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast' + (isSuccess ? ' success' : ' error');
    const icon = isSuccess
        ? `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`
        : `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;
    toast.innerHTML = icon + `<span>${escapeHtml(message)}</span>`;
    container.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('show'));
    setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
    }, 3000);
}

function getTimeAgo(date) {
    if (!date) return 'Just now';
    const secs = Math.floor((Date.now() - new Date(date)) / 1000);
    if (secs < 60) return 'Just now';
    const m = Math.floor(secs / 60); if (m < 60) return m + 'm ago';
    const h = Math.floor(m / 60);   if (h < 24) return h + 'h ago';
    const d = Math.floor(h / 24);   if (d < 7)  return d + 'd ago';
    return new Date(date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderNotifications() {
    const list = document.getElementById('notifList');
    let filtered = allNotifs;

    if (currentFilter === 'unread') {
        filtered = allNotifs.filter(n => !n.read);
    } else if (currentFilter !== 'all') {
        filtered = allNotifs.filter(n => n.type === currentFilter);
    }

    const unreadCount = allNotifs.filter(n => !n.read).length;
    document.getElementById('countAll').textContent = allNotifs.length > 0 ? allNotifs.length : '';
    document.getElementById('countUnread').textContent = unreadCount > 0 ? unreadCount : '';

    const markBtn = document.getElementById('markAllBtn');
    markBtn.disabled = unreadCount === 0;

    if (filtered.length === 0) {
        const emptyMsg =
            currentFilter === 'unread'       ? 'No unread notifications' :
            currentFilter === 'activation'   ? 'No activation notifications yet' :
            currentFilter === 'payment'      ? 'No payment notifications yet' :
            currentFilter === 'announcement' ? 'No announcements yet' :
                                               'No notifications yet';
        const emptySub = currentFilter === 'all'
            ? 'When you activate your account, make withdrawals, or receive admin announcements, they will appear here.'
            : 'Check back later for updates.';
        list.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </div>
                <div class="empty-title">${emptyMsg}</div>
                <div class="empty-desc">${emptySub}</div>
            </div>`;
        return;
    }

    const typeConfig = {
        activation:   { icon: 'success',      label: 'Activation',   svg: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>` },
        payment:      { icon: 'error',         label: 'Payment',      svg: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>` },
        announcement: { icon: 'announcement',  label: 'Announcement', svg: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>` },
        referral:     { icon: 'info',          label: 'Referral',     svg: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>` },
        system:       { icon: 'info',          label: 'System',       svg: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>` }
    };

    list.innerHTML = filtered.map((n, i) => {
        const cfg = typeConfig[n.type] || typeConfig.system;
        const unreadClass = n.read ? 'read' : 'unread';
        const dot = n.read ? '' : '<div class="unread-dot"></div>';
        return `
        <div class="notif-item ${unreadClass}" data-id="${escapeHtml(n.id)}" style="animation-delay:${i * 0.05}s">
            ${dot}
            <div class="notif-icon ${cfg.icon}">${cfg.svg}</div>
            <div class="notif-content">
                <div class="notif-title">${escapeHtml(n.title)}</div>
                <div class="notif-message">${escapeHtml(n.message)}</div>
                <div class="notif-meta">
                    <span class="notif-time">${getTimeAgo(n.timestamp)}</span>
                    <span class="notif-type-badge ${escapeHtml(n.type)}">${cfg.label}</span>
                </div>
            </div>
            <div class="notif-actions">
                <button class="notif-action-btn delete" data-delete-id="${escapeHtml(n.id)}" title="Delete">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                </button>
            </div>
        </div>`;
    }).join('');

    // Attach click events via delegation after render
    list.querySelectorAll('.notif-item').forEach(item => {
        item.addEventListener('click', () => markRead(item.dataset.id));
    });
    list.querySelectorAll('[data-delete-id]').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            deleteNotif(btn.dataset.deleteId);
        });
    });
}

// ── Filter tabs ───────────────────────────────────────────────────────────────

document.getElementById('filterTabs').addEventListener('click', e => {
    const tab = e.target.closest('.filter-tab');
    if (!tab) return;
    currentFilter = tab.dataset.filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderNotifications();
});

// ── Back button ───────────────────────────────────────────────────────────────

document.getElementById('backBtn').addEventListener('click', () => {
    navigateTo('pink-dashboard.html');
});

// ── Mark all read ─────────────────────────────────────────────────────────────

document.getElementById('markAllBtn').addEventListener('click', async () => {
    try {
        const unread = allNotifs.filter(n => !n.read);
        if (unread.length === 0) return;
        const batch = writeBatch(db);
        unread.forEach(n => batch.update(doc(db, 'userNotifications', n.id), { read: true }));
        await batch.commit();
        unread.forEach(n => { n.read = true; });
        renderNotifications();
        showToast('All marked as read', true);
    } catch (e) {
        showToast('Failed: ' + e.message, false);
    }
});

// ── Mark single read ──────────────────────────────────────────────────────────

async function markRead(id) {
    try {
        const n = allNotifs.find(x => x.id === id);
        if (!n || n.read) return;
        await updateDoc(doc(db, 'userNotifications', id), { read: true });
        n.read = true;
        renderNotifications();
    } catch (e) {
        showToast('Failed to mark read', false);
    }
}

// ── Delete notification ───────────────────────────────────────────────────────

async function deleteNotif(id) {
    if (!confirm('Delete this notification?')) return;
    try {
        await deleteDoc(doc(db, 'userNotifications', id));
        allNotifs = allNotifs.filter(n => n.id !== id);
        renderNotifications();
        showToast('Deleted', true);
    } catch (e) {
        showToast('Failed to delete', false);
    }
}

// ── Load notifications ────────────────────────────────────────────────────────

function loadNotifications(uid) {
    if (unsubNotifs) unsubNotifs();

    // Try with orderBy first (requires Firestore index)
    const q = query(collection(db, 'userNotifications'), where('userId', '==', uid), orderBy('timestamp', 'desc'));

    unsubNotifs = onSnapshot(q, snap => {
        allNotifs = snap.docs.map(d => {
            const data = d.data();
            return {
                id: d.id,
                title: data.title || 'Notification',
                message: data.message || '',
                type: data.type || 'system',
                read: data.read === true,
                timestamp: data.timestamp ? data.timestamp.toDate() : new Date(),
                data
            };
        });
        renderNotifications();
    }, err => {
        console.error('Notif error:', err);
        // If index error, try without orderBy as fallback
        if (err.message && err.message.includes('index')) {
            console.log('Firestore index missing, falling back to unordered query...');
            fallbackLoadNotifications(uid);
        } else {
            showToast('Failed to load notifications: ' + (err.message || 'Unknown error'), false);
            // Show empty state with error info
            document.getElementById('notifList').innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                    </div>
                    <div class="empty-title">Could not load notifications</div>
                    <div class="empty-desc">${err.message || 'Check your Firestore rules and ensure the userNotifications collection exists.'}</div>
                </div>`;
        }
    });
}

function fallbackLoadNotifications(uid) {
    if (unsubNotifs) unsubNotifs();
    const q = query(collection(db, 'userNotifications'), where('userId', '==', uid));
    unsubNotifs = onSnapshot(q, snap => {
        allNotifs = snap.docs.map(d => {
            const data = d.data();
            return {
                id: d.id,
                title: data.title || 'Notification',
                message: data.message || '',
                type: data.type || 'system',
                read: data.read === true,
                timestamp: data.timestamp ? data.timestamp.toDate() : new Date(),
                data
            };
        }).sort((a, b) => b.timestamp - a.timestamp); // Sort client-side
        renderNotifications();
    }, err => {
        console.error('Fallback notif error:', err);
        showToast('Failed to load notifications: ' + (err.message || 'Check Firestore rules'), false);
        document.getElementById('notifList').innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                </div>
                <div class="empty-title">Could not load notifications</div>
                <div class="empty-desc">${err.message || 'Check your Firestore rules and ensure the userNotifications collection exists.'}</div>
            </div>`;
    });
}

// ── Silent notification creation ──────────────────────────────────────────────

async function checkAndCreateSilentNotifs(user) {
    try {
        const uid = user.uid;
        const notifRef = collection(db, 'userNotifications');

        const userSnap = await getDoc(doc(db, 'users', uid));
        const userData = userSnap.exists() ? userSnap.data() : {};
        const isAdmin = userData.isAdmin === true;
        // Firestore-only activation check — no localStorage fallback
        const isActivated = userData.isActivated === true || userData.isAdmin === true;

        // Activation success notification — ONLY for non-admin users who got activated via payment approval
        // Admin accounts are auto-activated; their activation notif comes from the dashboard, not here
        if (isActivated && !isAdmin) {
            // Check if we already sent this activation notif for this user (persisted in localStorage)
            const activationNotifKey = 'pinkApp_activationNotifSent_' + uid;
            if (!localStorage.getItem(activationNotifKey)) {
                const existingActivation = await getDocs(query(notifRef, where('userId', '==', uid), where('type', '==', 'activation'), where('title', '==', 'Account Activated')));
                if (existingActivation.empty) {
                    await addDoc(notifRef, {
                        userId: uid,
                        userEmail: user.email || '',
                        title: 'Account Activated',
                        message: 'Your account has been successfully activated. You now have full access to withdrawals, referral bonuses, and all platform features.',
                        type: 'activation',
                        read: false,
                        silent: true,
                        timestamp: serverTimestamp()
                    });
                    localStorage.setItem(activationNotifKey, 'true');
                }
            }
        }

        // Check for approved payments (activation approved by admin) — skip for admin users
        if (!isAdmin) {
            const approvedPayments = await getDocs(query(collection(db, 'pendingPayments'), where('userId', '==', uid), where('status', '==', 'approved')));
            for (const payDoc of approvedPayments.docs) {
                const payData = payDoc.data();
                const existing = await getDocs(query(notifRef, where('userId', '==', uid), where('relatedDocId', '==', payDoc.id), where('title', '==', 'Account Activated')));
                if (existing.empty) {
                    await addDoc(notifRef, {
                        userId: uid,
                        userEmail: user.email || '',
                        title: 'Account Activated',
                        message: `Your activation payment of ₦${(payData.amount || 0).toLocaleString()} has been approved. Your account is now fully activated and you have access to all features.`,
                        type: 'activation',
                        read: false,
                        silent: true,
                        relatedDocId: payDoc.id,
                        amount: payData.amount || 0,
                        timestamp: serverTimestamp()
                    });
                }
            }
        }

        // Rejected payments — for ALL users
        const rejectedPayments = await getDocs(query(collection(db, 'pendingPayments'), where('userId', '==', uid), where('status', '==', 'rejected')));
        for (const payDoc of rejectedPayments.docs) {
            const payData = payDoc.data();
            const existing = await getDocs(query(notifRef, where('userId', '==', uid), where('relatedDocId', '==', payDoc.id)));
            if (existing.empty) {
                await addDoc(notifRef, {
                    userId: uid,
                    userEmail: user.email || '',
                    title: 'Payment Not Approved',
                    message: `Your activation payment of ₦${(payData.amount || 0).toLocaleString()} was not approved. Reason: ${payData.rejectionReason || 'Payment could not be verified. Please try again with a valid proof of payment.'}`,
                    type: 'payment',
                    read: false,
                    silent: true,
                    relatedDocId: payDoc.id,
                    timestamp: serverTimestamp()
                });
            }
        }

        // Check for approved withdrawals — skip for admin (admin withdrawals are auto-completed)
        if (!isAdmin) {
            const approvedWithdrawals = await getDocs(query(collection(db, 'pendingWithdrawals'), where('userId', '==', uid), where('status', '==', 'approved')));
            for (const wdDoc of approvedWithdrawals.docs) {
                const wdData = wdDoc.data();
                const existing = await getDocs(query(notifRef, where('userId', '==', uid), where('relatedDocId', '==', wdDoc.id), where('title', '==', 'Withdrawal Approved')));
                if (existing.empty) {
                    await addDoc(notifRef, {
                        userId: uid,
                        userEmail: user.email || '',
                        title: 'Withdrawal Approved',
                        message: `Your withdrawal of ₦${(wdData.amount || 0).toLocaleString()} to ${wdData.bankName || 'your bank'} has been approved and is being processed. You should receive it within 24 hours.`,
                        type: 'payment',
                        read: false,
                        silent: true,
                        relatedDocId: wdDoc.id,
                        amount: wdData.amount || 0,
                        timestamp: serverTimestamp()
                    });
                }
            }
        }

        // Check for completed withdrawals — for ALL users (admin gets this from withdraw page directly)
        const completedWithdrawals = await getDocs(query(collection(db, 'pendingWithdrawals'), where('userId', '==', uid), where('status', '==', 'completed')));
        for (const wdDoc of completedWithdrawals.docs) {
            const wdData = wdDoc.data();
            const existing = await getDocs(query(notifRef, where('userId', '==', uid), where('relatedDocId', '==', wdDoc.id), where('title', '==', 'Withdrawal Completed')));
            if (existing.empty) {
                await addDoc(notifRef, {
                    userId: uid,
                    userEmail: user.email || '',
                    title: 'Withdrawal Completed',
                    message: `Your withdrawal of ₦${(wdData.amount || 0).toLocaleString()} to ${wdData.bankName || 'your bank'} has been completed and sent. You should receive it within 24 hours.`,
                    type: 'payment',
                    read: false,
                    silent: true,
                    relatedDocId: wdDoc.id,
                    amount: wdData.amount || 0,
                    timestamp: serverTimestamp()
                });
            }
        }

        // Rejected withdrawals — for ALL users
        const rejectedWithdrawals = await getDocs(query(collection(db, 'pendingWithdrawals'), where('userId', '==', uid), where('status', '==', 'rejected')));
        for (const wdDoc of rejectedWithdrawals.docs) {
            const wdData = wdDoc.data();
            const existing = await getDocs(query(notifRef, where('userId', '==', uid), where('relatedDocId', '==', wdDoc.id)));
            if (existing.empty) {
                await addDoc(notifRef, {
                    userId: uid,
                    userEmail: user.email || '',
                    title: 'Withdrawal Declined',
                    message: `Your withdrawal request of ₦${(wdData.amount || 0).toLocaleString()} was declined. Reason: ${wdData.rejectionReason || 'Your withdrawal request could not be processed at this time. Please check your account details and try again.'}`,
                    type: 'payment',
                    read: false,
                    silent: true,
                    relatedDocId: wdDoc.id,
                    timestamp: serverTimestamp()
                });
            }
        }
    } catch (e) {
        console.error('Silent notif creation error:', e);
    }
}

// ── Auth gate ─────────────────────────────────────────────────────────────────

onAuthStateChanged(auth, user => {
    if (!user) {
        window.location.replace('pink-login.html');
        return;
    }
    loadNotifications(user.uid);
    checkAndCreateSilentNotifs(user);
});
</script>
